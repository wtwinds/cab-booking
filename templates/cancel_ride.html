{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">

        <div class="card shadow p-4 text-dark">

            <h3 class="text-center mb-3">Cancel Your Ride ❌</h3>

            <p class="text-center">
                Are you sure you want to cancel your cab booking?
            </p>

            <form method="POST" action="/cancel-confirm">

                <div class="mb-3">
                    <label class="form-label">Reason</label>
                    <select name="reason" class="form-control">
                        <option>Driver is taking too long</option>
                        <option>Change of plans</option>
                        <option>Booked by mistake</option>
                        <option>Other</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Comments (optional)</label>
                    <textarea name="comment" class="form-control" placeholder="Enter comment..."></textarea>
                </div>

                <div class="d-flex justify-content-between">
                    <a href="/live/sedan" class="btn btn-secondary">Go Back</a>
                    <button type="submit" class="btn btn-danger">
                        Confirm Cancellation
                    </button>
                </div>

            </form>

        </div>

    </div>
</div>

{% endblock %}
