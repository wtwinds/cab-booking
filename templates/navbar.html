<nav class="navbar navbar-dark bg-dark px-4 shadow">
    <a class="navbar-brand fw-bold" href="/dashboard">
        <i class="bi bi-taxi-front-fill text-warning"></i> Cab Booking
    </a>

    <div>

        <!-- ✅ Always show Dashboard button except on dashboard -->
        {% if request.path != '/dashboard' %}
        <a href="/dashboard" class="btn btn-warning btn-sm me-2">
            <i class="bi bi-arrow-left"></i> Dashboard
        </a>
        {% endif %}

        <!-- ✅ Add History in navbar -->
        <a href="/history" class="btn btn-outline-light btn-sm me-2">
            <i class="bi bi-clock-history"></i> History
        </a>

        <!-- ✅ ONLY SHOW PROFILE ON DASHBOARD -->
        {% if request.path == '/dashboard' %}
        <a href="/profile" class="btn btn-info btn-sm me-2">
            <i class="bi bi-person"></i> Profile
        </a>
        {% endif %}

        {% if session.user %}
        <span class="text-white me-3">
            <i class="bi bi-person-circle"></i> {{ session.user }}
        </span>
        <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
        {% else %}
        <a href="/" class="btn btn-outline-light btn-sm me-2">Login</a>
        <a href="/register" class="btn btn-warning btn-sm">Register</a>
        {% endif %}

    </div>
</nav>
